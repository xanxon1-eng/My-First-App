<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="app_icon_192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kingfisher App</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0ea5e9" />
  </head>
  <body>
    <div id="root">
      <div style="font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f0f9ff; color: #0c4a6e; position: relative;">
        <div style="text-align: center;">
          <div style="width: 24px; height: 24px; border: 2px solid #bae6fd; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem;"></div>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          <div id="loading-status" style="font-size: 0.75rem; opacity: 0.6;">Loading Nest...</div>
        </div>
        <div style="position: absolute; bottom: 1rem; font-size: 0.6rem; opacity: 0.3; font-family: monospace; display: flex; gap: 1rem;">
          <span>v1.0.4</span>
          <span id="init-id">READYING...</span>
        </div>
      </div>
    </div>
    <script>
      // Early ID generation for the loader
      const initId = 'WING-' + Math.random().toString(36).substring(2, 7).toUpperCase();
      document.getElementById('init-id').innerText = initId;
      window.INITIAL_ID = initId;

      // Troubleshooting timeout
      setTimeout(() => {
        const status = document.getElementById('loading-status');
        if (status && (status.innerText === 'Loading Nest...' || status.innerText === 'Still loading? Try Refreshing')) {
          status.innerHTML = 'Still stuck? <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload()" style="background:none; border:none; color:inherit; text-decoration:underline; cursor:pointer; padding:0; font:inherit;">Clear App Cache & Reload</button>';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `<div style="position: fixed; inset: 0; background: white; padding: 20px; color: red; z-index: 9999; overflow: auto;">
            <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Critical Error</h1>
            <p><strong>Message:</strong> ${msg}</p>
            <p><strong>URL:</strong> ${url}</p>
            <p><strong>Line/Col:</strong> ${line}:${col}</p>
            <pre style="margin-top: 1rem; background: #fee2e2; padding: 10px; border-radius: 5px;">${error ? error.stack : 'No stack trace'}</pre>
            <button onclick="location.reload()" style="margin-top: 1rem; padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 5px; cursor: pointer;">Reload</button>
          </div>`;
        }
        return false;
      };
    </script>
  </body>
</html>
