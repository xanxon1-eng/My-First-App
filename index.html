<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhu Club</title>
    <link rel="manifest" href="manifest.json?v=1.0.5">
    <link rel="apple-touch-icon" href="app_icon_192.png">
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
        }
        body {
            @apply bg-white text-slate-900 font-sans transition-colors duration-500;
        }

        /* Hide App UI in Browser */
        .app-view { display: none; }
        .browser-view { display: flex; }

        /* Show App UI when installed */
        @media (display-mode: standalone) {
            .app-view { display: flex; }
            .browser-view { display: none; }
            body { @apply bg-slate-50; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- BROWSER INSTALLER VIEW -->
    <div class="browser-view min-h-screen w-full flex flex-col items-center justify-center p-6 bg-white">
        <div class="max-w-md w-full text-center space-y-8">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-indigo-600 text-white rounded-3xl shadow-xl shadow-indigo-100 mb-4 rotate-3">
                <i data-lucide="sparkles" class="w-12 h-12"></i>
            </div>
            
            <div class="space-y-3">
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Uhu Club</h1>
                <p class="text-slate-500 leading-relaxed text-lg">
                    Install the official app on your home screen for the best experience.
                </p>
            </div>

            <div id="install-container" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
                <button id="install-button" class="group relative w-full flex items-center justify-center gap-3 bg-indigo-600 text-white px-8 py-5 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all active:scale-[0.98] shadow-lg shadow-indigo-200">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i>
                    Add to Home Screen
                </button>
            </div>

            <div class="pt-12 text-slate-300">
                <i data-lucide="arrow-down" class="w-6 h-6 mx-auto animate-bounce"></i>
            </div>
        </div>
        <div class="fixed bottom-6 text-[10px] text-slate-400 font-mono tracking-widest bg-slate-50 px-2 py-1 rounded">
            INSTALLER_V1.0.5
        </div>
    </div>

    <!-- ACTUAL APP VIEW -->
    <div class="app-view min-h-screen w-full flex flex-col bg-slate-50">
        <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="zap" class="w-5 h-5"></i>
                </div>
                <span class="font-bold text-lg tracking-tight">Uhu Dashboard</span>
            </div>
            <div class="text-[10px] bg-indigo-50 text-indigo-400 px-2 py-1 rounded-full font-bold">
                APP_V1.0.5
            </div>
        </header>

        <main class="p-6 flex-1 max-w-lg mx-auto w-full space-y-6">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <h2 class="text-xl font-bold mb-2">Welcome Back</h2>
                <p id="app-status" class="text-slate-500">Your application is running in standalone mode.</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-md">
                    <i data-lucide="activity" class="mb-4"></i>
                    <div class="text-xs opacity-80 uppercase font-bold tracking-wider">Sync State</div>
                    <div class="text-xl font-bold">Active</div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <i data-lucide="clock" class="mb-4 text-slate-400"></i>
                    <div class="text-xs text-slate-400 uppercase font-bold tracking-wider">Uptime</div>
                    <div class="text-xl font-bold">99.9%</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Init icons
        lucide.createIcons();

        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const installButton = document.getElementById('install-button');
        const statusEl = document.getElementById('app-status');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.classList.remove('hidden');
        });

        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installContainer.classList.add('hidden');
            }
            deferredPrompt = null;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW Registered');
                    statusEl.innerText = 'App is Ready';
                    statusEl.classList.remove('text-red-500');
                    statusEl.classList.add('text-slate-500');

                    // Check for updates periodically
                    setInterval(() => {
                        reg.update();
                    }, 60000); // every minute

                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        statusEl.innerText = 'Updating...';
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed') {
                                if (navigator.serviceWorker.controller) {
                                    console.log('New content detected.');
                                    statusEl.innerText = 'Update found! Refreshing...';
                                    setTimeout(() => window.location.reload(), 2000);
                                }
                            }
                        };
                    };
                }).catch(err => {
                    console.error('SW registration failed', err);
                    statusEl.innerText = 'Offline Mode';
                });

                // Force detection of new service worker taking over
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
            });
        }
    </script>
</body>
</html>
