<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="app_icon_192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uhu Notes</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />
  </head>
  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif;">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          <div style="font-weight: 600; color: #1e293b;">Uhu Notes</div>
          <div style="font-size: 0.875rem; color: #64748b; margin-top: 0.5rem;">If this takes long, please refresh.</div>
        </div>
      </div>
    </div>
    <script type="module" src="src/main.tsx"></script>
    <script>
      // Service worker management to fix blank page issues
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered for cleanup');
          }).catch(err => {
            console.error('SW registration failed', err);
            navigator.serviceWorker.getRegistrations().then(regs => {
              for(let r of regs) r.unregister();
            });
          });
        });
      }

      window.onerror = function(msg, url, line, col, error) {
        console.error('Window Error:', msg, 'at', url, ':', line);
        return false;
      };
    </script>
  </body>
</html>
