<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhu Club</title>
    <link rel="manifest" href="manifest.json?v=1.0.4">
    <link rel="apple-touch-icon" href="app_icon_192.png">
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
        }
        body {
            @apply bg-white text-slate-900 font-sans;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="max-w-md w-full text-center space-y-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-slate-100 rounded-2xl mb-4">
            <i data-lucide="package" class="w-10 h-10 text-slate-400"></i>
        </div>
        
        <div class="space-y-2">
            <h1 class="text-3xl font-bold tracking-tight">App Initialized</h1>
            <p id="app-status" class="text-slate-500 leading-relaxed font-bold text-red-500">
                Checking for updates...
            </p>
        </div>

        <div id="install-container" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
            <button id="install-button" class="group relative w-full flex items-center justify-center gap-3 bg-black text-white px-8 py-4 rounded-xl font-semibold hover:bg-slate-800 transition-all active:scale-[0.98]">
                <i data-lucide="download" class="w-5 h-5"></i>
                Install Application
            </button>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-4">PWA READY</p>
        </div>
    </div>

    <script>
        // Init icons
        lucide.createIcons();

        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const installButton = document.getElementById('install-button');
        const statusEl = document.getElementById('app-status');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.classList.remove('hidden');
        });

        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installContainer.classList.add('hidden');
            }
            deferredPrompt = null;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW Registered');
                    statusEl.innerText = 'App is Ready';
                    statusEl.classList.remove('text-red-500');
                    statusEl.classList.add('text-slate-500');

                    // Check for updates periodically
                    setInterval(() => {
                        reg.update();
                    }, 60000); // every minute

                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        statusEl.innerText = 'Updating...';
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed') {
                                if (navigator.serviceWorker.controller) {
                                    console.log('New content detected.');
                                    statusEl.innerText = 'Update found! Refreshing...';
                                    setTimeout(() => window.location.reload(), 2000);
                                }
                            }
                        };
                    };
                }).catch(err => {
                    console.error('SW registration failed', err);
                    statusEl.innerText = 'Offline Mode';
                });

                // Force detection of new service worker taking over
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
            });
        }
    </script>
</body>
</html>
